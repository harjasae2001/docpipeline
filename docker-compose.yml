version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: docpipeline-postgres
    environment:
      POSTGRES_DB: docpipeline
      POSTGRES_USER: ${DB_USERNAME:-docpipeline}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-docpipeline}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-docpipeline}"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.4
    container_name: docpipeline-localstack
    environment:
      SERVICES: s3,kms,sqs,events
      DEFAULT_REGION: ap-south-1
      AWS_DEFAULT_REGION: ap-south-1
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-setup.sh:/etc/localstack/init/ready.d/localstack-setup.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  localstack_data:
