spring:
  application:
    name: docpipeline
  datasource:
    url: jdbc:postgresql://localhost:5432/docpipeline
    username: ${DB_USERNAME:docpipeline}
    password: ${DB_PASSWORD:docpipeline}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  aws:
    region: ${AWS_REGION:ap-south-1}
    s3:
      bucket-name: ${S3_BUCKET_NAME:docpipeline-documents}
      presigned-url-expiration: 15m
    kms:
      key-id: ${KMS_KEY_ID:alias/docpipeline-key}
    sqs:
      queue-name: ${SQS_QUEUE_NAME:docpipeline-s3-events}
  jwt:
    secret: ${JWT_SECRET:7c9e8f1a2b3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f}
    expiration: 86400000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.docpipeline: DEBUG
    org.springframework.security: INFO
    software.amazon.awssdk: WARN
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

---
# ─── local profile ────────────────────────────────────────────────────────────
# Use when running Spring Boot directly on your machine (mvnw spring-boot:run).
# Both S3Client and S3Presigner point to localhost:4566 — browser can reach it.
spring:
  config:
    activate:
      on-profile: local

app:
  aws:
    endpoint-override: http://localhost:4566
    # presigner-endpoint-override not needed — falls back to endpoint-override

---
# ─── docker profile ───────────────────────────────────────────────────────────
# Use when running Spring Boot inside Docker Compose.
# S3Client  → localstack:4566  (container-to-container, Docker network hostname)
# S3Presigner → localhost:4566 (browser-accessible; presigned URLs go to the browser)
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    # Use Docker Compose service name instead of localhost
    url: jdbc:postgresql://postgres:5432/docpipeline

app:
  aws:
    endpoint-override: http://localstack:4566
    presigner-endpoint-override: http://localhost:4566
  cors:
    # Allow frontend running on host machine to call dockerised backend
    allowed-origins: http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173
